name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Frontend: parallel format, lint, type-check, test, build
  # ---------------------------------------------------------------------------
  frontend-format:
    name: Frontend / format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node

      - name: Check formatting (Prettier)
        run: pnpm format:check

  frontend-lint:
    name: Frontend / lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node

      - name: Lint (ESLint — all warnings are errors)
        run: pnpm lint

  frontend-typecheck:
    name: Frontend / type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node

      - name: Type check
        run: pnpm type-check

  frontend-test:
    name: Frontend / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node

      - name: Run tests
        run: pnpm test

  frontend-build:
    name: Frontend / build
    runs-on: ubuntu-latest
    needs: [frontend-typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node

      - name: Build frontend
        run: pnpm build

  # ---------------------------------------------------------------------------
  # Rust backend: format, clippy (-D warnings), build
  # ---------------------------------------------------------------------------
  rust:
    name: Rust backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Tauri on Linux)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            libwebkit2gtk-4.1-dev build-essential curl wget file
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
          version: 1.0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Check formatting (rustfmt)
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy (all warnings are errors)
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Build (check)
        working-directory: src-tauri
        run: cargo check --release
