name: Release

# Build release-optimised binaries for all target platforms and attach them to
# a GitHub Release. Triggered manually via the GitHub UI (Actions → Release →
# Run workflow). Supply a version tag (e.g. v1.2.3) at dispatch time.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.2.3)"
        required: true

jobs:
  # ---------------------------------------------------------------------------
  # Cross-platform release builds
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Tauri app (${{ matrix.platform }})
        uses: ./.github/actions/build-tauri
        with:
          # TODO: Add macOS universal binary support:
          #   args: --target universal-apple-darwin
          # That requires adding the aarch64-apple-darwin Rust target in the
          # setup-rust composite action and macOS code-signing inputs here.
          artifact-name: release-${{ matrix.platform }}-${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Publish GitHub Release
  # ---------------------------------------------------------------------------
  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Download all per-platform artifacts into one directory
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*-${{ github.sha }}
          merge-multiple: true
          path: dist/bundles

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          files: dist/bundles/**
          # TODO: Add release notes generation (e.g. via release-drafter) once
          # a changelog / PR-labelling convention is established.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
