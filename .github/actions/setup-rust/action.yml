name: Setup Rust toolchain
description: >
  Installs the Rust toolchain (stable by default) with the requested components,
  and restores the cargo registry and build cache. Reusable across epik-agent
  repositories.

inputs:
  toolchain:
    description: Rust toolchain to install (stable, nightly, etc.)
    required: false
    default: stable
  components:
    description: Space-separated list of rustup components to install
    required: false
    default: rustfmt clippy
  working-directory:
    description: Directory that contains Cargo.toml
    required: false
    default: src-tauri
  use-sccache:
    description: Enable sccache for Rust compilation
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install sccache
      if: inputs.use-sccache == 'true'
      uses: mozilla-actions/sccache-action@v0.0.5

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
      env:
        RUSTC_WRAPPER: ${{ inputs.use-sccache == 'true' && 'sccache' || '' }}

    - name: Restore Cargo cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          ${{ inputs.working-directory }}/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles(format('{0}/Cargo.lock', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ hashFiles(format('{0}/Cargo.toml', inputs.working-directory)) }}
          ${{ runner.os }}-cargo-
